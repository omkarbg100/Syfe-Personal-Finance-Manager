version: "3.8"

services:
  backend:
    build: ./syfe
    container_name: syfe-backend
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: syfe-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
